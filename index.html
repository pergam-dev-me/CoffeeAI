<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeAi Studio Workspace</title>
    
  <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- External CSS Style Sheet Reference Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar Control Panel Navigation -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
              <img src="https://i.postimg.cc/s1dDj0SL/file-00000000b14481f4a440303729c2d5d2.png" height="30px" width="30px" style="border-radius: 50px;">
            </div>
            <span>CoffeeAi Studio</span>
        </div>
        <button class="new-chat-btn" id="newThreadBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New
        </button>
        <div class="history-list">
            <div class="history-item active">Active Session Engine</div>
            <div class="history-item" data-preset="status">System Diagnostic</div>
            <div class="history-item" data-preset="help">Developer Utilities</div>
        </div>
    </aside>

    <!-- Main Live Workspace Window Frame -->
    <main class="chat-container">
        <header class="chat-header">
            <div class="agent-info">
                <div class="status-dot"></div>
                <span class="agent-name"></span>
            </div>
        </header>

        <!-- Message Pipeline Log Window -->
        <section class="chat-feed" id="chatFeed">
            <div class="message-group">
                <div class="message-row bot">
              <img src="https://i.postimg.cc/s1dDj0SL/file-00000000b14481f4a440303729c2d5d2.png" height="30px" width="30px" style="border-radius: 50px;">

                </div>
                    <div class="message-bubble">
                        Welcome to the interactive engine pipeline. Enter text below or trigger standard diagnostic routines directly from the sidebar array.
                    </div>
                </div>
            
        </section>

        <!-- Fixed Text Input Control Footer Panel -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="userInput" class="chat-input" placeholder="Ask a question or enter a command...">
                <button id="sendBtn" class="send-btn" style="background-color: blue;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

                </button>
            </div>
        </footer>
    </main>

    <!-- External JavaScript Application Behavior Script Link -->
<script src="script.js">
// Collect and isolate state management DOM target nodes
document.addEventListener('DOMContentLoaded', () => {
    const chatFeed = document.getElementById('chatFeed');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const newThreadBtn = document.getElementById('newThreadBtn');
    const presetItems = document.querySelectorAll('[data-preset]');

    // Pin scroll window position values cleanly to footer boundaries
    function scrollToBottom() {
        chatFeed.scrollTop = chatFeed.scrollHeight;
    }

    // Process and dispatch clear history buffer states
    function clearFeed() {
        chatFeed.innerHTML = `
            <div class="message-group">
                <div class="message-row bot">
                    <div class="avatar"><img src="https://i.postimg.cc/s1dDj0SL/file-00000000b14481f4a440303729c2d5d2.png" height="30px" width="30px" style="border-radius: 50px;">
</div>
                    <div class="message-bubble">Thread buffer cleared. Ready for initialization.</div>
                </div>
            </div>`;
        scrollToBottom();
    }

    // Inject preset text directly from side shortcuts
    function insertPreset(text) {
        userInput.value = text;
        sendMessage();
    }

    // Primary runtime payload dispatch loop logic
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Render user message bubble layout immediately
        appendMessage(text, 'user');
        userInput.value = '';
        setLoadingState(true);

        try {
            // Forward payload string elements tracking back to local Flask server route
            const response = await fetch("https://your-chatbot.onrender.com/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    message: "Hello"
  })
})
.then(response => response.json())
.then(data => console.log(data.reply));
            const data = await response.json();

            if (response.ok) {
                appendMessage(data.reply, 'bot', true);
            } else {
                appendMessage(`Error: ${data.message || 'Verification failure.'}`, 'bot');
            }
        } catch (err) {
            appendMessage("Connection problem.", "bot");
        } finally {
            setLoadingState(false);
        }
    }

    // Dynamic Element Builder Engine for message streams
    function appendMessage(text, sender, includeMeta = false) {
        const group = document.createElement('div');
        group.className = 'message-group';

        const avatarLabel = sender === 'user' ? '👤' : '🤖';
        
        // Construct standard structural content row
        const row = document.createElement('div');
        row.className = `message-row ${sender}`;
        row.innerHTML = `
            <div class="avatar">${avatarLabel}</div>
            <div class="message-bubble"></div>
        `;
        // Use textContent securely to avoid malicious raw HTML script injections
        row.querySelector('.message-bubble').textContent = text;
        group.appendChild(row);

        // Append sub-action control nodes if requested
        if (includeMeta) {
            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            
            const copyBtn = document.createElement('span');
            copyBtn.className = 'meta-action';
            copyBtn.textContent = 'Copy';
            copyBtn.addEventListener('click', () => navigator.clipboard.writeText(text));

            const reuseBtn = document.createElement('span');
            reuseBtn.className = 'meta-action';
            reuseBtn.textContent = 'Reuse';
            reuseBtn.addEventListener('click', () => insertPreset(text));

            meta.appendChild(copyBtn);
            meta.appendChild(reuseBtn);
            group.appendChild(meta);
        }
        
        chatFeed.appendChild(group);
        scrollToBottom();
    }

    // Toggle interactive focus variables during network transmission
    function setLoadingState(isLoading) {
        if (isLoading) {
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            const loader = document.createElement('div');
            loader.id = 'activeLoader';
            loader.className = 'message-row bot';
            loader.innerHTML = `
                <div class="avatar">AI</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatFeed.appendChild(loader);
        } else {
            userInput.disabled = false;
            sendBtn.disabled = false;
            const loader = document.getElementById('activeLoader');
            if (loader) loader.remove();
            userInput.focus();
        }
        scrollToBottom();
    }

    // Clean Event Listener Triggers
    sendBtn.addEventListener('click', sendMessage);
    newThreadBtn.addEventListener('click', clearFeed);
    
    userInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            sendMessage();
        }
    });

    presetItems.forEach(item => {
        item.addEventListener('click', () => {
            const command = item.getAttribute('data-preset');
            insertPreset(command);
        });
    });
});
    
</script>
</body>
</html>
